<script>
  window.$docsify = {
    name: '🦋 扑蝶',
    // repo: 'pudie88/pudie88.github.io',  // <-- 删掉或注释掉这行，右上角链接就消失了
    loadSidebar: true,
    loadNavbar: false,
    coverpage: false,
    auto2top: true,
    maxLevel: 3,
    subMaxLevel: 2,
    
    search: {
      placeholder: '🔍 搜索技术/标签...',
      noData: '😅 没找到相关内容～',
      depth: 4
    },
    
    copyCode: {
      buttonText: '📋 复制代码',
      errorText: ' 复制失败',
      successText: '✅ 复制成功！'
    },
    
    count: {
      countable: true,
      fontsize: '0.9em',
      color: 'rgb(142, 68, 173)',
      language: 'chinese',
      isExpected: true
    },
    
    pagination: {
      previousText: '← 上一篇',
      nextText: '下一篇 →',
      crossChapter: true,
      crossChapterText: true
    },
    
    mediumZoom: {
      margin: 24,
      background: 'rgba(0,0,0,0.5)',
      scrollOffset: 40
    },
    
    plugins: [
      function(hook, vm) {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          setTimeout(() => {
            const link = document.querySelector('link[href*="docsify-themeable"]');
            if (link) {
              link.href = 'https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css';
            }
          }, 100);
        }
        
        hook.afterEach(function(html) {
          const url = 'https://github.com/pudie88/pudie88.github.io/edit/main/' + vm.route.file;
          const footer = `
            <hr>
            <p style="text-align: center; color: #8e44ad; font-size: 0.9em;">
              🦋 发现错误？<a href="${url}" target="_blank">点此改进此文</a> | 
              由 <a href="https://docsify.js.org" target="_blank">Docsify</a> 驱动
            </p>
          `;
          return html + footer;
        });
      }
    ]
  }
</script>
